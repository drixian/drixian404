<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drixian - Verification Required</title>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .captcha-container {
            text-align: center;
            background: #1e1e1e;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        button {
            margin-top: 20px;
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            font-size: 16px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover { background-color: #0056b3; }
        .error-msg {
            color: #ff6b6b;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="captcha-container">
        <h2>Security Check</h2>
        <p>Please verify you are human to access Drixian.</p>
        
        <form id="captcha-form" onsubmit="validateCaptcha(event)">
            <div class="g-recaptcha" data-sitekey="6Le7zDYtAAAAAAlgQ9bKN9iXoIxUPmdBleOHjrXL" data-theme="dark"></div>
            <br/>
            <button type="submit">Proceed to Site</button>
            <div id="error" class="error-msg">Please complete the reCAPTCHA first!</div>
        </form>
    </div>

    <script>
        function validateCaptcha(event) {
            // Prevent the form from trying to reload the page
            event.preventDefault();
            
            // Check if the user successfully checked the reCAPTCHA box
            var response = grecaptcha.getResponse();
            
            if (response.length === 0) {
                // Captcha is not cleared, show error message
                document.getElementById('error').style.display = 'block';
            } else {
                // Captcha passed! Redirect them to your main content page
                // CHANGE 'main.html' to whatever your actual homepage file is named
                window.location.href = "main.html"; 
            }
        }
    </script>

</body>
</html>
